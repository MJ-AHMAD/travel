<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        header {
            background-color: black;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .menu-icon {
            cursor: pointer;
            font-size: 1.8em;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            right: 10px;
        }
        .menu-icon:hover .dropdown-content {
            display: block;
        }
        .dropdown-content a {
            color: black;
            padding: 8px 12px;
            text-decoration: none;
            display: block;
            font-size: 0.8em;
        }
        .dropdown-content a:hover {
            background-color: #ddd;
        }
        .container {
            padding: 20px;
        }
        .table-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .table-row select, .table-row input {
            width: 48%;
            padding: 10px;
        }
        .table-row .full-width {
            width: 100%;
        }
        .button-container {
            text-align: center;
            margin-top: 20px;
        }
        .search-button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="date"]::before {
            content: attr(placeholder);
            color: #aaa;
        }
        input[type="date"]:focus::before,
        input[type="date"]:valid::before {
            content: "";
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .checkbox-container input {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Logo</div>
        <div class="menu-icon">☰
            <div class="dropdown-content">
                <a href="#">Page 1</a>
                <a href="#">Page 2</a>
                <a href="#">Page 3</a>
            </div>
        </div>
    </header>
    <div class="container">
        <h1>Flight</h1>
        <div class="table-row">
            <select>
                <option value="one-way">One way</option>
                <option value="return">Return</option>
            </select>
            <select>
                <option value="economy">Economy</option>
                <option value="business">Business</option>
                <option value="premium">Premium</option>
            </select>
        </div>
        <div class="table-row">
            <input type="text" placeholder="Flying from">
            <input type="text" placeholder="Flying to">
        </div>
        <div class="table-row">
            <input type="date" placeholder="Date">
            <input type="date" placeholder="Return">
        </div>
        <div class="table-row">
            <input type="number" placeholder="Adult - 1" min="0" max="9">
            <input type="number" placeholder="Child-0" min="0" max="4">
            <input type="number" placeholder="Infant-0" min="0" max="2">
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="direct-flight">
            <label for="direct-flight">Only Direct Flight</label>
        </div>
        <div class="button-container">
            <button class="search-button">SEARCH FLIGHTS</button>
        </div>
    </div>
</body>
</html>
