<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.flight {
border: 1px solid #ccc;
padding: 10px;
margin: 10px 0;
}
.flight button {
background-color: #4CAF50;
color: white;
padding: 10px 20px;
border: none;
cursor: pointer;
}
.flight button:hover {
background-color: #45a049;
}
.booking-form {
display: none;
margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
<h2>Available Flights</h2>
<div class="flight">
<p><strong>Airline:</strong> Biman Bangladesh Airlines</p>
<p><strong>Price:</strong> BDT 5000</p>
<p><strong>Departure Time:</strong> 2024-10-20 10:00</p>
<p><strong>Arrival Time:</strong> 2024-10-20 14:00</p>
<button onclick="selectFlight('Biman Bangladesh Airlines', 'BDT 5000', '2024-10-20 10:00', '2024-10-20 14:00')">Book Now</button>
</div>
<div class="flight">
<p><strong>Airline:</strong> Emirates</p>
<p><strong>Price:</strong> BDT 15000</p>
<p><strong>Departure Time:</strong> 2024-10-21 12:00</p>
<p><strong>Arrival Time:</strong> 2024-10-21 18:00</p>
<button onclick="selectFlight('Emirates', 'BDT 15000', '2024-10-21 12:00', '2024-10-21 18:00')">Book Now</button>
</div>

<div class="booking-form" id="booking-form">
<h2>Passenger Information</h2>
<form>
<div class="form-group">
<label for="name">Name:</label>
<input type="text" id="name" name="name" class="form-control" required>
</div>
<div class="form-group">
<label for="address">Address:</label>
<input type="text" id="address" name="address" class="form-control" required>
</div>
<div class="form-group">
<label for="email">Email:</label>
<input type="email" id="email" name="email" class="form-control" required>
</div>
<div class="form-group">
<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone" class="form-control" required>
</div>
<div class="form-group">
<label for="flight-details">Flight Details:</label>
<textarea id="flight-details" name="flight-details" class="form-control" readonly></textarea>
</div>
<button type="submit" class="btn btn-primary">Confirm Booking</button>
</form>
</div>
</div>

<script>
function selectFlight(airline, price, departure, arrival) {
document.getElementById('flight-details').value = `Airline: ${airline}\nPrice: ${price}\nDeparture Time: ${departure}\nArrival Time: ${arrival}`;
document.getElementById('booking-form').style.display = 'block';
}
</script>
</body>
</html>
