<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Search</title>
    <link rel="stylesheet" href="css/fff.css">
</head>
<body>
    <header>
        <div class="logo">T-ALLY</div>
        <div class="menu-icon">☰
            <div class="dropdown-content">
                <a href="#home">Home</a>
                <a href="#services">Services</a>
                <a href="#contact">Contact</a>
                <a href="#about">About</a>
            </div>
        </div>
    </header>
    <h2>Flight</h2>
    <div class="flight-form">
        <div class="form-row">
            <div class="form-group">
                <label for="journey">Journey</label>
                <select id="journey">
                    <option value="one-way">One way</option>
                    <option value="return">Return</option>
                </select>
            </div>
            <div class="form-group">
                <label for="class">Class</label>
                <select id="class">
                    <option value="economy">Economy</option>
                    <option value="business">Business</option>
                    <option value="premium">Premium</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="flying-from">Flying from</label>
                <input type="text" id="flying-from" placeholder="Enter departure city">
            </div>
            <div class="form-group">
                <label for="flying-to">Flying to</label>
                <input type="text" id="flying-to" placeholder="Enter destination city">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="departure-date">Departure Date</label>
                <input type="date" id="departure-date">
            </div>
            <div class="form-group" id="return-date-cell" style="display: none;">
                <label for="return-date">Return Date</label>
                <input type="date" id="return-date">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="adults">Adults</label>
                <div class="number-input">
                    <button onclick="changeValue('adults', -1)">-</button>
                    <input type="number" id="adults" value="1" min="1">
                    <button onclick="changeValue('adults', 1)">+</button>
                </div>
            </div>
            <div class="form-group">
                <label for="children">Children</label>
                <div class="number-input">
                    <button onclick="changeValue('children', -1)">-</button>
                    <input type="number" id="children" value="0" min="0">
                    <button onclick="changeValue('children', 1)">+</button>
                </div>
            </div>
            <div class="form-group">
                <label for="infants">Infants</label>
                <div class="number-input">
                    <button onclick="changeValue('infants', -1)">-</button>
                    <input type="number" id="infants" value="0" min="0">
                    <button onclick="changeValue('infants', 1)">+</button>
                </div>
            </div>
        </div>
        <button onclick="searchFlights()">SEARCH FLIGHTS</button>
    </div>

    <script>
        document.getElementById('journey').addEventListener('change', function() {
            const returnDateCell = document.getElementById('return-date-cell');
            if (this.value === 'return') {
                returnDateCell.style.display = 'block';
            } else {
                returnDateCell.style.display = 'none';
            }
        });

        function changeValue(id, delta) {
            const input = document.getElementById(id);
            const newValue = parseInt(input.value) + delta;
            if (newValue >= parseInt(input.min)) {
                input.value = newValue;
            }
        }

        function searchFlights() {
            const journey = document.getElementById('journey').value;
            const flightClass = document.getElementById('class').value;
            const flyingFrom = document.getElementById('flying-from').value;
            const flyingTo = document.getElementById('flying-to').value;
            const departureDate = document.getElementById('departure-date').value;
            const returnDate = document.getElementById('return-date').value;
            const adults = document.getElementById('adults').value;
            const children = document.getElementById('children').value;
            const infants = document.getElementById('infants').value;

            const url = new URL('current_page.html', window.location.href);
            url.searchParams.append('journey', journey);
            url.searchParams.append('class', flightClass);
            url.searchParams.append('flyingFrom', flyingFrom);
            url.searchParams.append('flyingTo', flyingTo);
            url.searchParams.append('departureDate', departureDate);
            if (journey === 'return') {
                url.searchParams.append('returnDate', returnDate);
            }
            url.searchParams.append('adults', adults);
            url.searchParams.append('children', children);
            url.searchParams.append('infants', infants);

            window.location.href = url.toString();
        }
    </script>
</body>
</html>
