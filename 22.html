<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking</title>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <div id="flightDetails"></div>
    <form id="payment-form">
        <div id="card-element"></div>
        <button type="submit">Book Flight</button>
    </form>
    <div id="payment-result"></div>
    <script src="payment.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const airlineCode = urlParams.get('airlineCode');
        const airlineFullName = urlParams.get('airlineFullName');
        const priceBDT = urlParams.get('priceBDT');
        const departureTime = urlParams.get('departureTime');
        const arrivalTime = urlParams.get('arrivalTime');

        const flightDetailsDiv = document.getElementById('flightDetails');
        flightDetailsDiv.innerHTML = `
            <p><strong>Airline:</strong> ${airlineCode} (${airlineFullName})</p>
            <p><strong>Price:</strong> BDT ${priceBDT}</p>
            <p><strong>Departure Time:</strong> ${departureTime}</p>
            <p><strong>Arrival Time:</strong> ${arrivalTime}</p>
        `;
    </script>
</body>
</html>
