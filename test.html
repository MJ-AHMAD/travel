<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin and Padding Example</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            margin: 20px; /* বাইরের স্থান */
            padding: 20px; /* ভিতরের স্থান */
        }
    </style>
</head>
<body>
    <div class="box">This is a box with margin and padding.</div>
</body>
</html>
