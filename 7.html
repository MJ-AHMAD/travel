<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
#results {
white-space: pre-wrap; /* JSON ডেটা সুন্দরভাবে প্রদর্শনের জন্য */
}
.flight {
border: 1px solid #ccc;
padding: 10px;
margin: 10px 0;
}
.flight button {
background-color: #4CAF50; /* Green */
color: white;
padding: 10px 20px;
border: none;
cursor: pointer;
}
.flight button:hover {
background-color: #45a049;
}
</style>
</head>
<body>
<div class="container">
<div class="row">
<div class="pb-3 h3 text-left">Flight Search </div>
</div>
<form id="flight-form" onsubmit="return validateForm()">
<div class="row">
<div class="form-group col-md align-items-start flex-column">
<label for="origin" class="d-inline-flex">From</label>
<input type="text" placeholder="City or Airport" class="form-control" id="origin" name="origin" required>
</div>
<div class="form-group col-md align-items-start flex-column">
<label for="depart" class="d-inline-flex">To</label>
<input type="text" placeholder="City or Airport" class="form-control" id="depart" name="depart" required>
</div>
</div>
<div class="row">
<div class="form-group col-md align-items-start flex-column">
<label for="trip-type" class="d-inline-flex">Trip Type</label>
<select class="form-select" id="trip-type" name="trip-type" onchange="toggleReturnDate()">
<option value="one-way">One Way</option>
<option value="return">Return</option>
</select>
</div>
</div>
<div class="row">
<div class="form-group col-md align-items-start flex-column">
<label for="departure-date" class="d-inline-flex">Depart</label>
<input type="date" class="form-control" id="departure-date" name="departure-date" onkeydown="return false" required>
</div>
<div class="form-group col-md align-items-start flex-column" id="return-date-group" style="display: none;">
<label for="return-date" class="d-inline-flex">Return</label>
<input type="date" placeholder="One way" value="" onChange="this.setAttribute('value', this.value)" class="form-control" id="return-date" name="return-date">
</div>
</div>
<div class="row">
<div class="form-group col-lg-3 align-items-start flex-column">
<label for="adults" class="d-inline-flex col-auto">Adults <span class="sublabel"> 12+ </span></label>
<select class="form-select" id="adults" onchange="javascript: dynamicDropDown(this.options[this.selectedIndex].value);">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
</select>
</div>
<div class="form-group col-lg-3 align-items-start flex-column">
<label for="children" class="d-inline-flex col-auto">Children <span class="sublabel"> 2-11 </span></label>
<select class="form-select" id="children">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>
</div>
<div class="form-group col-lg-3 align-items-start flex-column">
<label for="infants" class="d-inline-flex col-auto">Infants <span class="sublabel"> less than 2</span></label>
<select class="form-select" id="infants">
<option value="0">0</option>
<option value="1">1</option>
</select>
</div>
</div>
<div class="row">
<div class="form-group col-lg-6 align-items-start flex-column">
<label for="cabin" class="d-inline-flex">Cabin</label>
<select class="form-select" id="cabin">
<option value="ECONOMY">Economy</option>
<option value="PREMIUM_ECONOMY">Premium Economy</option>
<option value="BUSINESS">Business</option>
<option value="FIRST">First</option>
</select>
</div>
<div class="form-group col-lg-6 align-items-start flex-column pt-lg-4">
<div class="form-check form-switch">
<input class="form-check-input align-self-center" type="checkbox" id="directFlights">
<label class="form-check-label d-inline-flex align-self-center" for="directFlights">Direct flights</label>
</div>
</div>
</div>
<div class="row">
<div class="text-left col-auto">
<button type="submit" class="btn btn-primary">Search flights</button>
</div>
</div>
</form>
<div id="results"></div>
</div>
<script>
  // এয়ারলাইনের পূর্ণ নামের ম্যাপ
const airlineNames = {
'BG': 'Biman Bangladesh Airlines',
'SV': 'Saudi Arabian Airlines',
'EK': 'Emirates',
'QR': 'Qatar Airways',
'EY': 'Etihad Airways'
// অন্যান্য এয়ারলাইনের নাম এখানে যোগ করুন
};

// এয়ারপোর্টের নামের ডেটা
const airports = [
{ code: 'DAC', name: 'Hazrat Shahjalal International Airport' },
{ code: 'CGP', name: 'Shah Amanat International Airport' },
{ code: 'ZYL', name: 'Osmani International Airport' },
{ code: 'CXB', name: 'Cox\'s Bazar Airport' },
// অন্যান্য এয়ারপোর্টের নাম এখানে যোগ করুন
];

// এয়ারপোর্টের নাম অটো-কমপ্লিট ফাংশন
function autocomplete(inp, arr) {
let currentFocus;
inp.addEventListener("input", function(e) {
let a, b, i, val = this.value;
closeAllLists();
if (!val) { return false;}
currentFocus = -1;
a = document.createElement("DIV");
a.setAttribute("id", this.id + "autocomplete-list");
a.setAttribute("class", "autocomplete-items");
this.parentNode.appendChild(a);
for (i = 0; i < arr.length; i++) {
if (arr[i].name.substr(0, val.length).toUpperCase() == val.toUpperCase()) {
b = document.createElement("DIV");
b.innerHTML = "<strong>" + arr[i].name.substr(0, val.length) + "</strong>";
b.innerHTML += arr[i].name.substr(val.length);
b.innerHTML += "<input type='hidden' value='" + arr[i].name + "'>";
b.addEventListener("click", function(e) {
inp.value = this.getElementsByTagName("input")[0].value;
closeAllLists();
});
a.appendChild(b);
}
}
});
inp.addEventListener("keydown", function(e) {
let x = document.getElementById(this.id + "autocomplete-list");
if (x) x = x.getElementsByTagName("div");
if (e.keyCode == 40) {
currentFocus++;
addActive(x);
} else if (e.keyCode == 38) {
currentFocus--;
addActive(x);
} else if (e.keyCode == 13) {
e.preventDefault();
if (currentFocus > -1) {
if (x) x[currentFocus].click();
}
}
});
function addActive(x) {
if (!x) return false;
removeActive(x);
if (currentFocus >= x.length) currentFocus = 0;
if (currentFocus < 0) currentFocus = (x.length - 1);
x[currentFocus].classList.add("autocomplete-active");
}
function removeActive(x) {
for (let i = 0; i < x.length; i++) {
x[i].classList.remove("autocomplete-active");
}
}
function closeAllLists(elmnt) {
let x = document.getElementsByClassName("autocomplete-items");
for (let i = 0; i < x.length; i++) {
if (elmnt != x[i] && elmnt != inp) {
x[i].parentNode.removeChild(x[i]);
}
}
}
document.addEventListener("click", function (e) {
closeAllLists(e.target);
});
}

// From এবং To ফিল্ডের জন্য অটো-কমপ্লিট ফাংশন কল
autocomplete(document.getElementById("origin"), airports);
autocomplete(document.getElementById("depart"), airports);

// Return তারিখের ঘর প্রদর্শনের জন্য ফাংশন
function toggleReturnDate() {
const tripType = document.getElementById('trip-type').value;
const returnDateGroup = document.getElementById('return-date-group');
if (tripType === 'return') {
returnDateGroup.style.display = 'block';
} else {
returnDateGroup.style.display = 'none';
}
}

// Access Token জেনারেট করার জন্য নিচের কোডটি ব্যবহার করুন
fetch('https://test.api.amadeus.com/v1/security/oauth2/token', {
method: 'POST',
headers: {
'Content-Type': 'application/x-www-form-urlencoded'
},
body: new URLSearchParams({
'grant_type': 'client_credentials',
'client_id': 'IAdRK7OA8APheG6fswXod39h9fiK52tz', // এখানে আপনার API Key বসান
'client_secret': 'JxrFEAiPI3KfkL4R' // এখানে আপনার API Secret বসান
})
})
.then(response => response.json())
.then(data => {
const accessToken = data.access_token;
// Access Token ব্যবহার করে API কল করুন
document.getElementById('flight-form').addEventListener('submit', function(event) {
event.preventDefault();
const origin = document.getElementById('origin').value;
const destination = document.getElementById('depart').value;
const departureDate = document.getElementById('departure-date').value;
const returnDate = document.getElementById('return-date').value;
const directFlights = document.getElementById('directFlights').checked ? 'true' : 'false';
const adults = document.getElementById('adults').value;
const children = document.getElementById('children').value;
const infants = document.getElementById('infants').value;
const cabin = document.getElementById('cabin').value;

let url = `https://test.api.amadeus.com/v2/shopping/flight-offers?originLocationCode=${origin}&destinationLocationCode=${destination}&departureDate=${departureDate}&adults=${adults}&children=${children}&infants=${infants}&travelClass=${cabin}&nonStop=${directFlights}`;
if (returnDate) {
url += `&returnDate=${returnDate}`;
}

fetch(url, {
method: 'GET',
headers: {
'Authorization': `Bearer ${accessToken}`
}
})
.then(response => response.json())
.then(data => {
const resultsDiv = document.getElementById('results');
resultsDiv.innerHTML = ''; // পূর্বের ফলাফল মুছে ফেলুন

data.data.forEach(flight => {
const flightDiv = document.createElement('div');
flightDiv.classList.add('flight');

const airlineCode = flight.validatingAirlineCodes[0];
const airlineFullName = airlineNames[airlineCode] || 'Unknown Airline';
const priceUSD = flight.price.total;
const priceBDT = (priceUSD * 85).toFixed(2); // USD থেকে BDT রূপান্তর (প্রায় 85 BDT = 1 USD)
const departureTime = flight.itineraries[0].segments[0].departure.at;
const arrivalTime = flight.itineraries[0].segments[0].arrival.at;

flightDiv.innerHTML = `
<p><strong>Airline:</strong> ${airlineCode} (${airlineFullName})</p>
<p><strong>Price:</strong> BDT ${priceBDT}</p>
<p><strong>Departure Time:</strong> ${departureTime}</p>
<p><strong>Arrival Time:</strong> ${arrivalTime}</p>
<button onclick="alert('Booking functionality not implemented yet')">Book Now</button>
`;

resultsDiv.appendChild(flightDiv);

// রিটার্ন ফ্লাইটের তথ্য প্রদর্শন
if (flight.itineraries.length > 1) {
const returnFlight = flight.itineraries[1].segments[0];
const returnDepartureTime = returnFlight.departure.at;
const returnArrivalTime = returnFlight.arrival.at;

const returnFlightDiv = document.createElement('div');
returnFlightDiv.classList.add('flight');

returnFlightDiv.innerHTML = `
<p><strong>Return Flight:</strong></p>
<p><strong>Airline:</strong> ${airlineCode} (${airlineFullName})</p>
<p><strong>Price:</strong> BDT ${priceBDT}</p>
<p><strong>Departure Time:</strong> ${returnDepartureTime}</p>
<p><strong>Arrival Time:</strong> ${returnArrivalTime}</p>
<button onclick="alert('Booking functionality not implemented yet')">Book Now</button>
`;

resultsDiv.appendChild(returnFlightDiv);
}
});
})
.catch(error => console.error('Error:', error));
});
})
.catch(error => console.error('Error:', error));
    </script>
</body>
</html>
