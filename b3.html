<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.flight {
border: 1px solid #ccc;
padding: 10px;
margin: 10px 0;
}
.flight button {
background-color: #4CAF50;
color: white;
padding: 10px 20px;
border: none;
cursor: pointer;
}
.flight button:hover {
background-color: #45a049;
}
.booking-form {
display: none;
margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
<h2>Flight Search</h2>
<form id="search-form">
<div class="form-group">
<label for="origin">From:</label>
<input type="text" id="origin" name="origin" class="form-control" required>
</div>
<div class="form-group">
<label for="destination">To:</label>
<input type="text" id="destination" name="destination" class="form-control" required>
</div>
<div class="form-group">
<label for="departure-date">Departure Date:</label>
<input type="date" id="departure-date" name="departure-date" class="form-control" required>
</div>
<div class="form-group">
<label for="return-date">Return Date:</label>
<input type="date" id="return-date" name="return-date" class="form-control">
</div>
<button type="submit" class="btn btn-primary">Search Flights</button>
</form>

<div id="results"></div>

<div class="booking-form" id="booking-form">
<h2>Passenger Information</h2>
<form>
<div class="form-group">
<label for="name">Name:</label>
<input type="text" id="name" name="name" class="form-control" required>
</div>
<div class="form-group">
<label for="address">Address:</label>
<input type="text" id="address" name="address" class="form-control" required>
</div>
<div class="form-group">
<label for="email">Email:</label>
<input type="email" id="email" name="email" class="form-control" required>
</div>
<div class="form-group">
<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone" class="form-control" required>
</div>
<div class="form-group">
<label for="flight-details">Flight Details:</label>
<textarea id="flight-details" name="flight-details" class="form-control" readonly></textarea>
</div>
<button type="submit" class="btn btn-primary">Confirm Booking</button>
</form>
</div>
</div>

<script>
document.getElementById('search-form').addEventListener('submit', function(event) {
event.preventDefault();
const origin = document.getElementById('origin').value;
const destination = document.getElementById('destination').value;
const departureDate = document.getElementById('departure-date').value;
const returnDate = document.getElementById('return-date').value;

fetch('https://test.api.amadeus.com/v2/shopping/flight-offers?originLocationCode=' + origin + '&destinationLocationCode=' + destination + '&departureDate=' + departureDate + '&returnDate=' + returnDate, {
method: 'GET',
headers: {
'Authorization': 'Bearer YOUR_ACCESS_TOKEN'
}
})
.then(response => response.json())
.then(data => {
const resultsDiv = document.getElementById('results');
resultsDiv.innerHTML = '';

data.data.forEach(flight => {
const flightDiv = document.createElement('div');
flightDiv.classList.add('flight');

const airline = flight.validatingAirlineCodes[0];
const price = flight.price.total;
const departureTime = flight.itineraries[0].segments[0].departure.at;
const arrivalTime = flight.itineraries[0].segments[0].arrival.at;

flightDiv.innerHTML = `
<p><strong>Airline:</strong> ${airline}</p>
<p><strong>Price:</strong> ${price}</p>
<p><strong>Departure Time:</strong> ${departureTime}</p>
<p><strong>Arrival Time:</strong> ${arrivalTime}</p>
<button onclick="selectFlight('${airline}', '${price}', '${departureTime}', '${arrivalTime}')">Book Now</button>
`;

resultsDiv.appendChild(flightDiv);
});
})
.catch(error => console.error('Error:', error));
});

function selectFlight(airline, price, departure, arrival) {
document.getElementById('flight-details').value = `Airline: ${airline}\nPrice: ${price}\nDeparture Time: ${departure}\nArrival Time: ${arrival}`;
document.getElementById('booking-form').style.display = 'block';
}
</script>
</body>
</html>
